version: '3.8'

services:
    postgres:
        image: postgres:16-alpine
        container_name: boilerplate_postgres
        restart: unless-stopped
        ports:
            - '5432:5432'
        environment:
            POSTGRES_USER: ${DB_USER:-admin}
            POSTGRES_PASSWORD: ${DB_PASSWORD:-admin123}
            POSTGRES_DB: ${DB_NAME:-boilerplate_db}
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:7-alpine
        container_name: boilerplate_redis
        restart: unless-stopped
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        # Inicia o redis com persistência básica (Append Only File)
        command: redis-server --appendonly yes

# Definimos os volumes fora dos serviços para que o Docker os gerencie
# Isso garante que você não perca os dados se desligar os containers
volumes:
    postgres_data:
    redis_data:
